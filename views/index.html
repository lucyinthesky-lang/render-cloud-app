<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Media Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .media-card { transition: transform 0.2s; }
    .media-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <span class="navbar-brand mb-0 h1">☁️ Cloud Media Hub</span>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4 text-center">Galería de Medios en la Nube</h2>
    <div class="row g-4">
      <% items.forEach(item => { %>
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card h-100 media-card shadow-sm">
            <div class="card-body">
              <h5 class="card-title"><%= item.title %></h5>
              <p class="card-text"><%= item.description %></p>
              <span class="badge bg-secondary mb-2"><%= item.platform %></span>
              <br>
              <a href="<%= item.cloud_url %>" target="_blank" rel="noopener noreferrer" class="btn btn-outline-primary btn-sm">
                🔗 Ver en la nube
              </a>
            </div>
          </div>
        </div>
      <% }) %>
    </div>
    <footer class="mt-5 text-center text-muted">
      <small>Desplegado en Render | DB: PostgreSQL | UI: Bootstrap 5</small>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
